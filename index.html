<!DOCTYPE html>
<!-- ================================================================
  DevOps Notes Portal — Multi-Repo Edition
  ================================================================
  HOW IT WORKS:
  1. Each topic lives in its OWN GitHub repo (linux, docker, etc.)
  2. This index.html lives in ONE separate "portal" repo
  3. Your GitHub username is AUTO-DETECTED from the GitHub Pages URL
  4. You only need to list your repo names in REPOS below

  SETUP (one-time):
  a) Create a repo named e.g. "devops-notes" on GitHub
  b) Put this index.html in that repo root
  c) Edit the REPOS list below to match your actual repo names
  d) Enable GitHub Pages → Settings → Pages → main → / (root)
  e) Visit  https://YOUR_USERNAME.github.io/devops-notes/

  ADDING NEW TOPICS:
  - Create your new repo (e.g. "ansible")
  - Add that repo name to the REPOS list below
  - Push → done. No other changes needed.
================================================================ -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps & Linux Learning Notes</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --warning: #d29922;
            --tag-bg: #1f3d6e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* ── Header ── */
        .header {
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0;
        }
        .header h1 { font-size: 17px; font-weight: 700; color: var(--accent); white-space: nowrap; }
        .header .subtitle { color: var(--text-muted); font-size: 12px; }
        .search-wrap { margin-left: auto; position: relative; }
        .search-wrap input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 12px 6px 30px;
            font-size: 13px;
            width: 220px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap .si {
            position: absolute; left: 9px; top: 50%;
            transform: translateY(-50%); font-size: 12px;
        }
        /* ── Layout ── */
        .layout { display: flex; flex: 1; overflow: hidden; }
        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-section { padding: 14px 12px; }
        .sidebar-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .topic-item {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 10px; border-radius: 6px;
            cursor: pointer; margin-bottom: 2px;
            font-size: 13px; transition: background 0.12s;
        }
        .topic-item:hover { background: var(--card-bg); }
        .topic-item.active { background: var(--tag-bg); color: var(--accent); }
        .t-icon { font-size: 15px; flex-shrink: 0; }
        .t-badge {
            margin-left: auto;
            background: var(--card-bg); color: var(--text-muted);
            font-size: 10px; padding: 1px 6px; border-radius: 10px;
        }
        .topic-item.active .t-badge { background: var(--accent); color: #000; font-weight: 700; }
        /* ── Main content area ── */
        .content { flex: 1; display: flex; overflow: hidden; }
        .lessons-panel {
            width: 260px; border-right: 1px solid var(--border);
            overflow-y: auto; flex-shrink: 0; padding: 14px 12px;
        }
        .lessons-panel h3 {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 10px; padding: 0 4px;
        }
        .lesson-item {
            padding: 9px 12px; border-radius: 6px;
            cursor: pointer; margin-bottom: 3px;
            font-size: 13px; border: 1px solid transparent;
            transition: all 0.12s; line-height: 1.4;
        }
        .lesson-item:hover { background: var(--card-bg); border-color: var(--border); }
        .lesson-item.active { background: var(--card-bg); border-color: var(--accent); color: var(--accent); }
        .lesson-num { color: var(--text-muted); font-size: 10px; display: block; margin-bottom: 2px; }
        /* ── Article ── */
        .article-panel { flex: 1; overflow-y: auto; padding: 36px 44px; }
        /* ── Welcome ── */
        .welcome {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 60vh;
            color: var(--text-muted); text-align: center; padding: 32px;
        }
        .welcome-icon { font-size: 56px; margin-bottom: 20px; }
        .welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
        .welcome p { font-size: 14px; max-width: 420px; line-height: 1.7; }
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; margin-top: 28px; width: 100%; max-width: 620px;
        }
        .topic-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 12px;
            cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .topic-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .topic-card .tc-icon { font-size: 26px; margin-bottom: 8px; }
        .topic-card .tc-name { font-size: 12px; font-weight: 600; color: var(--text); }
        /* ── Markdown ── */
        .markdown-body { max-width: 820px; }
        .markdown-body h1 { font-size: 26px; font-weight: 700; margin: 0 0 6px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .markdown-body h2 { font-size: 20px; font-weight: 700; margin: 30px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
        .markdown-body h3 { font-size: 16px; font-weight: 600; margin: 22px 0 8px; color: var(--accent); }
        .markdown-body h4 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; }
        .markdown-body p { line-height: 1.8; margin: 0 0 14px; }
        .markdown-body ul, .markdown-body ol { padding-left: 22px; margin: 0 0 14px; }
        .markdown-body li { line-height: 1.8; margin-bottom: 4px; }
        .markdown-body li > code, .markdown-body p > code, .markdown-body td > code {
            font-family: 'Consolas', 'Fira Code', monospace;
            background: rgba(110,118,129,0.15);
            border: 1px solid var(--border);
            padding: 1px 6px; border-radius: 4px;
            font-size: 12.5px; color: #f97583;
        }
        .markdown-body pre {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto; margin: 16px 0;
            position: relative;
        }
        .markdown-body pre code {
            background: none; border: none; padding: 0;
            font-size: 13.5px; line-height: 1.65; color: var(--text);
        }
        .markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 10px 16px; margin: 16px 0;
            color: var(--text-muted); background: var(--card-bg);
            border-radius: 0 6px 6px 0;
        }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
        .markdown-body th { background: var(--card-bg); padding: 9px 14px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
        .markdown-body td { padding: 8px 14px; border: 1px solid var(--border); }
        .markdown-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .markdown-body strong { color: #e0e0e0; }
        /* ── Nav buttons ── */
        .nav-buttons { display: flex; gap: 12px; margin-top: 36px; padding-top: 22px; border-top: 1px solid var(--border); }
        .nav-btn {
            flex: 1; padding: 10px 14px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text);
            cursor: pointer; font-size: 12px; transition: all 0.15s;
            font-family: inherit;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
        .nav-btn .dir { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 3px; }
        /* ── Breadcrumb ── */
        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-bottom: 22px; }
        .breadcrumb .sep { color: var(--border); }
        .breadcrumb .crumb-active { color: var(--text); }
        /* ── Spinner ── */
        .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text-muted); font-size: 13px; gap: 8px; }
        .spinner { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* ── Error ── */
        .error-box { background: #2d1b1b; border: 1px solid #5c2020; border-radius: 8px; padding: 16px; color: #ffa0a0; font-size: 13px; line-height: 1.7; }
        /* ── Setup form ── */
        .setup-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 24px; max-width: 500px; }
        .setup-box h3 { color: var(--warning); margin-bottom: 4px; font-size: 15px; }
        .setup-box p { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.6; }
        .setup-box label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
        .setup-box input {
            display: block; width: 100%;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text);
            padding: 8px 12px; margin: 5px 0 14px;
            font-size: 13px; outline: none; font-family: inherit;
        }
        .setup-box input:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; font-family: inherit; }
        .btn:hover { background: var(--accent-hover); }
        /* ── How-to card ── */
        .info-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; margin-bottom: 18px; max-width: 640px; }
        .info-card h3 { font-size: 14px; margin-bottom: 10px; }
        .info-card ol, .info-card ul { padding-left: 20px; font-size: 13px; line-height: 1.9; color: var(--text-muted); }
        .info-card li strong { color: var(--text); }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { width: 200px; }
            .lessons-panel { width: 220px; }
            .article-panel { padding: 24px 20px; }
        }
        @media (max-width: 600px) {
            .sidebar { display: none; }
            .lessons-panel { width: 180px; }
        }
    </style>
</head>
<body>

<div class="header">
    <span style="font-size:22px">📚</span>
    <div>
        <h1>DevOps &amp; Linux Notes</h1>
        <span class="subtitle">Personal Knowledge Base</span>
    </div>
    <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Search topics &amp; lessons…" oninput="handleSearch(this.value)">
    </div>
</div>

<div class="layout">
    <nav class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Topics</div>
            <div id="topicList">
                <div class="loading"><div class="spinner"></div> Loading…</div>
            </div>
        </div>
    </nav>

    <div class="content">
        <div class="lessons-panel" id="lessonsPanel" style="display:none">
            <h3 id="lessonsPanelTitle">Lessons</h3>
            <div id="lessonList"></div>
        </div>

        <div class="article-panel" id="articlePanel">
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">🚀</div>
                <h2>Welcome to DevOps Notes</h2>
                <p>Select a topic from the sidebar to start browsing lessons. New folders added to the repo appear here automatically.</p>
                <div class="topics-grid" id="welcomeGrid"></div>
            </div>
            <div id="articleContent" style="display:none"></div>
        </div>
    </div>
</div>

<script>
/* ================================================================
   ▼▼▼  EDIT THIS LIST — add/remove your repo names here  ▼▼▼
   Each name must exactly match your GitHub repository name.
================================================================ */
const REPOS = [
    'shell',
    'linux',
    'networking',
    'docker',
    'kubernetes',
    'terraform',
    'gcp',
    'aws',
    'azure',
    'grafana',
];
/* ================================================================
   ▲▲▲  That's the only thing you ever need to edit  ▲▲▲
================================================================ */

const BRANCH = 'main';

/* ── Auto-detect GitHub username from the Pages URL ── */
let GITHUB_USER = '';
function detectUser() {
    const h = window.location.hostname;   // username.github.io
    if (h.endsWith('.github.io')) {
        GITHUB_USER = h.replace('.github.io', '');
        return true;
    }
    return false;   // running locally → show instructions
}

/* ── Topic icons ── */
const ICONS = {
    shell:'🐚', bash:'🐚', linux:'🐧', networking:'🌐', network:'🌐',
    docker:'🐳', kubernetes:'☸️', k8s:'☸️', terraform:'🏗️',
    gcp:'☁️', aws:'🟠', azure:'🔵', grafana:'📊',
    prometheus:'🔥', git:'🔀', python:'🐍', ansible:'🔧',
    nginx:'🔩', jenkins:'🤖', cicd:'⚙️',
};
const DEFAULT_ICON = '📁';
function icon(name) { return ICONS[name.toLowerCase()] || DEFAULT_ICON; }
function cap(s)     { return s.charAt(0).toUpperCase() + s.slice(1); }
function safeName(s){ return s.replace(/^\d+-/,'').replace(/\.(md|txt)$/,'').replace(/-/g,' '); }
function esc(t)     { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function apiHeaders() {
    return { Accept: 'application/vnd.github.v3+json' };
}
async function fetchJSON(url) {
    const r = await fetch(url, { headers: apiHeaders() });
    if (!r.ok) throw new Error(`GitHub API error ${r.status}: ${r.statusText}`);
    return r.json();
}

/* ── State ── */
let currentRepo    = null;
let currentLessons = [];

/* ── Init ── */
async function init() {
    if (!detectUser()) { showLocalInfo(); return; }
    buildSidebar();
    handleHash();
}

/* ── Build sidebar from REPOS list (no API call needed) ── */
function buildSidebar() {
    const topicList  = document.getElementById('topicList');
    const welcomeGrid = document.getElementById('welcomeGrid');
    topicList.innerHTML  = '';
    welcomeGrid.innerHTML = '';

    REPOS.forEach(repo => {
        const ico     = icon(repo);
        const display = cap(repo);

        // Sidebar item
        const div = document.createElement('div');
        div.className  = 'topic-item';
        div.dataset.repo = repo;
        div.innerHTML  = `<span class="t-icon">${ico}</span><span>${display}</span><span class="t-badge" id="badge-${repo}">…</span>`;
        div.onclick    = () => selectRepo(repo);
        topicList.appendChild(div);

        // Welcome grid card
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = `<div class="tc-icon">${ico}</div><div class="tc-name">${display}</div>`;
        card.onclick   = () => selectRepo(repo);
        welcomeGrid.appendChild(card);

        // Fetch lesson count in background
        countLessons(repo);
    });
}

async function countLessons(repo) {
    try {
        const url   = `https://api.github.com/repos/${GITHUB_USER}/${repo}/contents/?ref=${BRANCH}`;
        const items = await fetchJSON(url);
        const n     = items.filter(i => i.name.endsWith('.md') || i.name.endsWith('.txt') || i.name.endsWith('.sh')).length;
        const el    = document.getElementById(`badge-${repo}`);
        if (el) el.textContent = n || '–';
    } catch(_) {
        const el = document.getElementById(`badge-${repo}`);
        if (el) el.textContent = '–';
    }
}

/* ── Select a repo → load its files ── */
async function selectRepo(repo) {
    currentRepo = repo;

    document.querySelectorAll('.topic-item').forEach(el => {
        el.classList.toggle('active', el.dataset.repo === repo);
    });

    const lessonsPanel = document.getElementById('lessonsPanel');
    const lessonList   = document.getElementById('lessonList');
    document.getElementById('lessonsPanelTitle').textContent = cap(repo);
    lessonsPanel.style.display = 'block';
    lessonList.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    showLoading();

    try {
        const url   = `https://api.github.com/repos/${GITHUB_USER}/${repo}/contents/?ref=${BRANCH}`;
        const items = await fetchJSON(url);
        currentLessons = items
            .filter(i => i.type === 'file' && (i.name.endsWith('.md') || i.name.endsWith('.txt') || i.name.endsWith('.sh')))
            .sort((a, b) => a.name.localeCompare(b.name));

        lessonList.innerHTML = '';
        if (currentLessons.length === 0) {
            lessonList.innerHTML = `<div style="padding:12px;color:var(--text-muted);font-size:12px">No .md files found in this repo yet.</div>`;
            showWelcome();
            return;
        }

        currentLessons.forEach((lesson, idx) => {
            const display = cap(safeName(lesson.name));
            const div     = document.createElement('div');
            div.className = 'lesson-item';
            div.id        = `li-${lesson.name}`;
            div.innerHTML = `<span class="lesson-num">Lesson ${idx + 1}</span>${display}`;
            div.onclick   = () => selectLesson(lesson, idx);
            lessonList.appendChild(div);
        });

        selectLesson(currentLessons[0], 0);

    } catch (err) {
        const msg = err.message.includes('404')
            ? `Repo "<strong>${repo}</strong>" not found or is private.<br>Make sure the repo is Public and the name in REPOS matches exactly.`
            : err.message;
        lessonList.innerHTML = `<div class="error-box">❌ ${msg}</div>`;
        showArticle(`<div class="error-box">❌ ${msg}</div>`);
    }
}

/* ── Select a lesson → fetch and render ── */
async function selectLesson(lesson, idx) {
    document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`li-${lesson.name}`);
    if (el) el.classList.add('active');
    showLoading();

    try {
        const rawUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${currentRepo}/${BRANCH}/${lesson.name}`;
        const res    = await fetch(rawUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text   = await res.text();

        const display = cap(safeName(lesson.name));
        let bodyHtml  = lesson.name.endsWith('.md')
            ? marked.parse(text)
            : `<pre><code>${esc(text)}</code></pre>`;

        const prev = idx > 0                          ? currentLessons[idx - 1] : null;
        const next = idx < currentLessons.length - 1 ? currentLessons[idx + 1] : null;
        const navHtml = `
            <div class="nav-buttons">
                ${prev ? `<button class="nav-btn" onclick="selectLesson(currentLessons[${idx-1}],${idx-1})"><span class="dir">← Prev</span>${cap(safeName(prev.name))}</button>` : '<span></span>'}
                ${next ? `<button class="nav-btn" onclick="selectLesson(currentLessons[${idx+1}],${idx+1})"><span class="dir">Next →</span>${cap(safeName(next.name))}</button>` : '<span></span>'}
            </div>`;

        const breadcrumb = `
            <div class="breadcrumb">
                <span>${icon(currentRepo)} ${cap(currentRepo)}</span>
                <span class="sep">›</span>
                <span class="crumb-active">${display}</span>
            </div>`;

        showArticle(breadcrumb + `<div class="markdown-body">${bodyHtml}${navHtml}</div>`);
        document.querySelectorAll('.article-panel pre code').forEach(b => hljs.highlightElement(b));
        history.replaceState(null, '', `#${encodeURIComponent(currentRepo)}/${encodeURIComponent(lesson.name)}`);

    } catch (err) {
        showArticle(`<div class="error-box">❌ Failed to load file: ${err.message}</div>`);
    }
}

function showLoading() {
    document.getElementById('welcomeScreen').style.display = 'none';
    const a = document.getElementById('articleContent');
    a.style.display = 'block';
    a.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
}
function showArticle(html) {
    document.getElementById('welcomeScreen').style.display = 'none';
    const a = document.getElementById('articleContent');
    a.style.display = 'block';
    a.innerHTML = html;
    a.scrollTop = 0;
}
function showWelcome() {
    document.getElementById('welcomeScreen').style.display = 'flex';
    document.getElementById('articleContent').style.display = 'none';
}

/* ── Shown when opening locally (not on GitHub Pages) ── */
function showLocalInfo() {
    document.getElementById('welcomeScreen').style.display = 'none';
    const a = document.getElementById('articleContent');
    a.style.display = 'block';
    a.innerHTML = `
        <div class="setup-box">
            <h3>ℹ️ Running Locally</h3>
            <p>This portal is designed to be hosted on <strong>GitHub Pages</strong>.<br>
            When hosted there, it auto-configures itself — no setup needed.</p>
            <p style="margin-top:10px">You are opening this file directly on your computer (<code>file://</code>),
            so the auto-detection cannot work yet.</p>
        </div>
        <div class="info-card">
            <h3>🚀 How to Deploy (Step by Step)</h3>
            <ol>
                <li>Create a <strong>new public GitHub repo</strong> — e.g. <code>devops-notes</code></li>
                <li>Put this <strong>index.html</strong> in the root of that repo</li>
                <li>Edit the <strong>REPOS list</strong> near the top of index.html to match your repo names:<br>
                    <code style="display:block;margin:6px 0;padding:8px;background:#010409;border-radius:4px">const REPOS = ['linux', 'docker', 'shell', ...];</code>
                </li>
                <li>Push to GitHub</li>
                <li>Go to repo <strong>Settings → Pages → Source: main → / (root)</strong> → Save</li>
                <li>Visit <code>https://YOUR_USERNAME.github.io/devops-notes/</code> ✅</li>

        </div>

}

function handleSearch(q) {
    q = q.toLowerCase();
    document.querySelectorAll('.topic-item').forEach(el => {
        el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
    document.querySelectorAll('.lesson-item').forEach(el => {
        el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}

function handleHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    const [repo, lesson] = hash.split('/').map(decodeURIComponent);
    if (!repo) return;
    setTimeout(async () => {
        await selectRepo(repo);
        if (lesson) {
            const found = currentLessons.find(l => l.name === lesson);
            if (found) selectLesson(found, currentLessons.indexOf(found));
        }
    }, 300);
}

marked.setOptions({ breaks: true, gfm: true });
init();
